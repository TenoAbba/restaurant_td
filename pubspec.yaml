  country_code_picker: ^3.4.1

  dotted_border: ^3.1.0
  geocoding: ^4.0.0
  googleapis_auth: ^2.0.0

  cached_network_image: ^3.4.1
  flutter_easyloading: ^3.0.5
  flutter_email_sender: ^8.0.0
  flutter_html: any
  flutter_local_notifications: ^19.5.0
  flutter_svg: ^2.2.2
  geolocator: any
  location: ^8.0.1
  get: ^4.7.2
  google_sign_in: ^7.2.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  pin_code_fields: ^8.0.1

  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^7.0.1
  syncfusion_flutter_datepicker: ^31.2.10
  timer_count_down: ^2.2.2
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  date_picker_timeline: ^1.2.7
  flutter_rating_bar: ^4.0.1
  datetime_picker_formfield_new: ^2.1.0
  flutter_polyline_points: ^3.1.0
  clipboard: ^2.0.2
  map_launcher: ^4.4.2
  story_view: ^0.16.6
  bottom_picker: ^4.1.1
  multi_select_flutter: ^4.1.3
  in_app_review: ^2.0.11
  share_plus: ^12.0.1
  photo_view: ^0.15.0
  path_provider: ^2.1.5
  video_compress: ^3.1.4
  mime: ^2.0.0
  mailer: ^6.6.0
  dropdown_search: ^6.0.2
  flutter_multi_formatter: ^2.13.10
  audioplayers: ^6.5.1

  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  video_player: ^2.10.1
  google_maps_flutter: ^2.14.0
  google_maps_place_picker_mb: ^3.1.2


  esc_pos_utils: any
  print_bluetooth_thermal: ^1.1.7
  syncfusion_flutter_pdf: ^31.2.10

  #payment dependency
  flutter_stripe: ^12.1.1
  razorpay_flutter: ^1.4.0
  flutter_paypal: ^0.2.1


  webview_flutter: ^4.9.0
  http: ^1.3.0
  rxdart: ^0.28.0

dependency_overrides:
  google_api_headers: ^5.0.1
  package_info_plus: ^9.0.0
  syncfusion_flutter_core: ^31.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher/icon.png"
  image_path_android: "assets/launcher/icon.png"
  image_path_ios: "assets/launcher/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/launcher/icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  fonts:
    - family: Urbanist-Black
      fonts:
        - asset: assets/fonts/Urbanist-Black.ttf

    - family: Urbanist-Bold
      fonts:
        - asset: assets/fonts/Urbanist-Bold.ttf

    - family: Urbanist-ExtraBold
      fonts:
        - asset: assets/fonts/Urbanist-ExtraBold.ttf

    - family: Urbanist-ExtraLight
      fonts:
        - asset: assets/fonts/Urbanist-ExtraLight.ttf

    - family: Urbanist-Light
      fonts:
        - asset: assets/fonts/Urbanist-Light.ttf

    - family: Urbanist-Medium
      fonts:
        - asset: assets/fonts/Urbanist-Medium.ttf

    - family: Urbanist-Regular
      fonts:
        - asset: assets/fonts/Urbanist-Regular.ttf

    - family: Urbanist-SemiBold
      fonts:
        - asset: assets/fonts/Urbanist-SemiBold.ttf

    - family: Urbanist-Thin
      fonts:
        - asset: assets/fonts/Urbanist-Thin.ttf

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/launcher/
    - assets/
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
