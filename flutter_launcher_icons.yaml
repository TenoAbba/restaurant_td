dev_dependencies:
  flutter_launcher_icons: "^0.11.0"

flutter_icons:
  android: "icon_app"
  ios: "AppIcon-App"
  image_path: "assets/launcher/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/launcher/icon.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"
  windows:
    generate: true
    image_path: "assets/launcher/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/launcher/icon.png"
